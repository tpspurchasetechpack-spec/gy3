<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepa Sadhana – Gayatri Peetham Trust</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #F5C842;
      --gold-deep: #D4A017;
      --gold-light: #FDE882;
      --gold-pale: #FFF8DC;
      --amber: #E8900A;
      --saffron: #FF8C00;
      --crimson: #C0392B;
      --cream: #FFFBF0;
      --brown-dark: #3B1F00;
      --brown-mid: #7A4510;
      --brown-light: #C47B2B;
      --white: #FFFFFF;
      --shadow-gold: rgba(212,160,23,0.4);
      --flame1: #FF4500;
      --flame2: #FF8C00;
      --flame3: #FFD700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--cream);
      color: var(--brown-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 0%, #FDE88244 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 80% 100%, #F5C84222 0%, transparent 55%),
        radial-gradient(ellipse 60% 60% at 10% 80%, #FF8C0011 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top border ── */
    .top-border {
      height: 8px;
      background: linear-gradient(90deg,
        var(--brown-dark) 0%, var(--gold) 20%, var(--amber) 40%,
        var(--gold) 60%, var(--amber) 80%, var(--brown-dark) 100%);
      position: relative; z-index: 10;
    }

    /* ── Deepa Sadhana Hero Banner ── */
    .deepa-hero {
      position: relative;
      z-index: 2;
      background: linear-gradient(135deg, #1a0800 0%, #3B1F00 40%, #5A2D00 70%, #2a1000 100%);
      overflow: hidden;
      padding: 0;
    }

    .deepa-hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 50% 50%, #FF8C0022 0%, transparent 70%),
        radial-gradient(ellipse 30% 50% at 20% 80%, #FFD70015 0%, transparent 50%),
        radial-gradient(ellipse 30% 50% at 80% 80%, #FFD70015 0%, transparent 50%);
      pointer-events: none;
    }

    /* Floating diya particles */
    .diya-particle {
      position: absolute;
      font-size: 1.2rem;
      animation: floatUp 6s ease-in-out infinite;
      opacity: 0.6;
    }
    .diya-particle:nth-child(1) { left: 5%; animation-delay: 0s; animation-duration: 7s; }
    .diya-particle:nth-child(2) { left: 15%; animation-delay: 1.5s; animation-duration: 5.5s; }
    .diya-particle:nth-child(3) { left: 75%; animation-delay: 0.8s; animation-duration: 6.5s; }
    .diya-particle:nth-child(4) { left: 88%; animation-delay: 2s; animation-duration: 5s; }
    .diya-particle:nth-child(5) { left: 35%; animation-delay: 3s; animation-duration: 8s; }
    .diya-particle:nth-child(6) { left: 60%; animation-delay: 1s; animation-duration: 6s; }

    @keyframes floatUp {
      0% { transform: translateY(120px) scale(0.8); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.4; }
      100% { transform: translateY(-20px) scale(1.1); opacity: 0; }
    }

    .deepa-hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2.5rem 1rem 2rem;
    }

    /* Decorative diya row */
    .diya-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .diya-svg-container {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    /* CSS Diya */
    .css-diya {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: flicker 2s ease-in-out infinite;
    }

    .css-diya:nth-child(even) { animation-delay: 0.5s; }
    .css-diya:nth-child(3n) { animation-delay: 1s; }

    @keyframes flicker {
      0%, 100% { filter: drop-shadow(0 0 6px #FFD700) brightness(1); }
      25% { filter: drop-shadow(0 0 10px #FF8C00) brightness(1.15); }
      50% { filter: drop-shadow(0 0 4px #FFA500) brightness(0.95); }
      75% { filter: drop-shadow(0 0 12px #FFD700) brightness(1.1); }
    }

    .flame {
      width: 12px;
      height: 18px;
      background: linear-gradient(to top, #FF4500, #FF8C00 40%, #FFD700 70%, #FFFACD);
      border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
      animation: flameAnim 1.5s ease-in-out infinite;
      position: relative;
    }

    .flame.big { width: 16px; height: 24px; }
    .flame.small { width: 9px; height: 13px; }

    @keyframes flameAnim {
      0%, 100% { transform: scaleX(1) skewX(0deg); }
      33% { transform: scaleX(0.85) skewX(-8deg); }
      66% { transform: scaleX(1.1) skewX(6deg); }
    }

    .diya-body {
      width: 28px; height: 10px;
      background: linear-gradient(135deg, #D4A017, #8B4513, #D4A017);
      border-radius: 0 0 50% 50% / 0 0 100% 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      margin-top: 1px;
    }

    .diya-body.big { width: 36px; height: 13px; }
    .diya-body.small { width: 22px; height: 8px; }

    .diya-base {
      width: 32px; height: 4px;
      background: #8B4513;
      border-radius: 50%;
      opacity: 0.7;
    }

    .diya-base.big { width: 42px; }
    .diya-base.small { width: 26px; }

    /* Hero text */
    .event-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }

    .deepa-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 7vw, 4.5rem);
      font-weight: 900;
      color: var(--gold-light);
      text-shadow:
        0 0 40px rgba(255,200,50,0.6),
        0 2px 20px rgba(255,140,0,0.4),
        0 4px 4px rgba(0,0,0,0.5);
      line-height: 1.1;
      letter-spacing: 0.05em;
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(255,200,50,0.5), 0 2px 20px rgba(255,140,0,0.3), 0 4px 4px rgba(0,0,0,0.5); }
      50% { text-shadow: 0 0 60px rgba(255,200,50,0.9), 0 2px 30px rgba(255,140,0,0.6), 0 4px 4px rgba(0,0,0,0.5); }
    }

    .deepa-subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.8rem, 2.5vw, 1.1rem);
      color: #FFC878;
      letter-spacing: 0.2em;
      margin-top: 0.4rem;
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* Event message banner */
    .event-message-banner {
      position: relative;
      z-index: 2;
      margin: 0;
      background: linear-gradient(135deg, #2a1400, #4a2200, #2a1400);
      border-top: 1px solid rgba(212,160,23,0.3);
      border-bottom: 2px solid var(--gold-deep);
      padding: 1.2rem 2rem;
      text-align: center;
    }

    .event-message-text {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #FFE4A0;
      line-height: 1.7;
      font-style: italic;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── Admin Panel ── */
    .admin-toggle-bar {
      position: relative; z-index: 5;
      background: #f0e8d0;
      border-bottom: 1px solid var(--gold);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.8rem;
    }

    .admin-toggle-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.9rem;
      border: 1.5px solid var(--brown-mid);
      border-radius: 20px;
      background: transparent;
      color: var(--brown-mid);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .admin-toggle-btn:hover, .admin-toggle-btn.active {
      background: var(--brown-dark);
      color: var(--gold);
      border-color: var(--brown-dark);
    }

    .admin-panel {
      position: relative; z-index: 4;
      background: linear-gradient(135deg, #fff8e8, #fff3d4);
      border-bottom: 2px solid var(--gold);
      padding: 1.5rem 2rem 2rem;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .admin-panel-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      color: var(--brown-dark);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (max-width: 600px) { .admin-grid { grid-template-columns: 1fr; } }

    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .admin-field label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--brown-mid);
      text-transform: uppercase;
      font-weight: 700;
    }

    .admin-field textarea, .admin-field input[type="text"], .admin-field input[type="date"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      color: var(--brown-dark);
      background: #fffdf5;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .admin-field textarea:focus, .admin-field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--shadow-gold);
    }

    .admin-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-apply {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: var(--brown-dark);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 10px var(--shadow-gold);
    }

    .btn-apply:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--shadow-gold); }

    .btn-gen-link {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 1.4rem;
      border: 1.5px solid var(--brown-dark);
      border-radius: 8px;
      background: var(--brown-dark);
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-gen-link:hover { background: var(--brown-mid); }

    .link-box {
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      background: var(--brown-dark);
      border-radius: 10px;
      border: 1px solid var(--gold-deep);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .link-url {
      flex: 1;
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      color: var(--gold-light);
      word-break: break-all;
      line-height: 1.5;
    }

    .btn-copy {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.9rem;
      border: 1.5px solid var(--gold);
      border-radius: 20px;
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .btn-copy:hover { background: var(--gold); color: var(--brown-dark); }
    .btn-copy.copied { background: #2d7a2d; border-color: #2d7a2d; color: white; }

    .link-share-row {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.6rem;
      flex-wrap: wrap;
    }

    .share-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      padding: 0.3rem 0.8rem;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      text-transform: uppercase;
    }

    .share-wa { background: #25D366; color: white; }
    .share-wa:hover { background: #1da851; }
    .share-fb { background: #1877F2; color: white; }
    .share-fb:hover { background: #0d5fcc; }
    .share-tw { background: #1DA1F2; color: white; }
    .share-tw:hover { background: #0c85d0; }

    /* ── Trust Header ── */
    header {
      position: relative; z-index: 2;
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      background: linear-gradient(180deg, #FDE882AA 0%, transparent 100%);
    }

    .om-symbol {
      font-size: 3rem;
      color: var(--amber);
      display: block;
      line-height: 1;
      filter: drop-shadow(0 2px 8px var(--shadow-gold));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .trust-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4vw, 2.5rem);
      font-weight: 900;
      color: var(--brown-dark);
      letter-spacing: 0.04em;
      margin: 0.3rem 0 0.2rem;
      text-shadow: 0 2px 12px var(--shadow-gold);
    }

    .trust-tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      color: var(--brown-mid);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin: 0.8rem auto 0;
    }
    .ornament-line { height: 1px; width: 70px; background: linear-gradient(90deg, transparent, var(--gold-deep)); }
    .ornament-line.right { background: linear-gradient(90deg, var(--gold-deep), transparent); }
    .ornament-diamond { width: 8px; height: 8px; background: var(--gold-deep); transform: rotate(45deg); }

    /* ── Info / Form tabs ── */
   .info-tabs {
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* ✅ 5 tabs per row */
  gap: 6px;
  margin-bottom: 1.2rem;

    }.info-tab {
  padding: 0.55rem 0.3rem;
  border: 1px solid var(--gold);
  background: transparent;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  color: var(--brown-mid);
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  text-transform: uppercase;
  border-radius: 6px;

    }

    .info-tab:last-child { border-right: none; }
    .info-tab.active { background: linear-gradient(135deg, var(--gold), var(--amber)); color: var(--brown-dark); font-weight: 700; }
    .info-tab:hover:not(.active) { background: var(--gold-pale); }

    .tab-pane { animation: fadeIn 0.3s ease; }

    .deity-card { display: flex; flex-direction: column; gap: 0.9rem; }

    .deity-emblem {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 0.3rem;
      box-shadow: 0 4px 16px var(--shadow-gold), 0 0 0 4px #FDE88266;
    }

    .deity-name { font-family: 'Cinzel Decorative', serif; font-size: 1.05rem; color: var(--brown-dark); text-align: center; font-weight: 700; }
    .deity-subtitle { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--amber); text-align: center; letter-spacing: 0.12em; text-transform: uppercase; margin-top: -0.4rem; margin-bottom: 0.2rem; }
    .deity-desc { font-size: 0.97rem; color: var(--brown-mid); line-height: 1.75; text-align: justify; }

    .mantra-box {
      background: var(--brown-dark); border-radius: 10px;
      padding: 0.9rem 1rem; text-align: center; border-left: 3px solid var(--gold);
    }

    .mantra-text { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold-light); line-height: 1.7; letter-spacing: 0.03em; }
    .mantra-meaning { font-size: 0.78rem; color: #C8A86E; margin-top: 0.4rem; font-style: italic; }

    .founder-stat-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .founder-stat { flex: 1; min-width: 80px; background: var(--gold-pale); border: 1px solid var(--gold); border-radius: 8px; padding: 0.5rem 0.4rem; text-align: center; }
    .founder-stat-num { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: var(--amber); font-weight: 700; display: block; }
    .founder-stat-lbl { font-size: 0.7rem; color: var(--brown-mid); font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

    .highlight-tag {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: var(--brown-dark);
      font-family: 'Cinzel', serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.08em; padding: 0.2rem 0.6rem;
      border-radius: 20px; margin: 0.2rem 0.2rem 0.2rem 0;
    }

    main {
      position: relative; z-index: 2;
      max-width: 960px; margin: 0 auto;
      padding: 2rem 1rem 4rem;
      display: grid; grid-template-columns: 1fr 1.1fr;
      gap: 2.5rem; align-items: start;
    }

    @media (max-width: 700px) { main { grid-template-columns: 1fr; gap: 2rem; } }

    .info-panel {
      background: linear-gradient(135deg, #FFF8DC, #FDEAA0);
      border: 1px solid var(--gold); border-radius: 16px;
      padding: 2rem 1.5rem;
      box-shadow: 0 8px 32px var(--shadow-gold), inset 0 1px 0 #FFFFFF88;
    }

    .info-panel h2 { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--brown-dark); margin-bottom: 1rem; font-weight: 700; }

    .seva-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .seva-item { display: flex; align-items: center; gap: 0.75rem; font-size: 1rem; color: var(--brown-mid); }
    .seva-icon { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--amber)); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; box-shadow: 0 2px 8px var(--shadow-gold); }

    .info-quote { margin-top: 1.5rem; padding: 1rem 1.2rem; background: var(--brown-dark); border-radius: 10px; color: var(--gold-light); font-style: italic; font-size: 1rem; line-height: 1.6; border-left: 3px solid var(--gold); }
    .trust-details { margin-top: 1.5rem; }
    .trust-details h3 { font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--brown-dark); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .trust-detail-row { font-size: 0.9rem; color: var(--brown-mid); margin-bottom: 0.3rem; display: flex; gap: 0.4rem; }
    .detail-label { font-weight: 600; color: var(--brown-dark); }

    /* ── Deepa Sadhana info card ── */
    .deepa-info-card {
      background: linear-gradient(135deg, #1a0800, #3B1F00);
      border: 1.5px solid var(--gold-deep);
      border-radius: 12px;
      padding: 1.2rem 1.3rem;
      margin-bottom: 0.5rem;
    }

    .deepa-info-card h3 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.9rem;
      color: var(--gold-light);
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .deepa-info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .deepa-info-list li {
      font-size: 0.92rem;
      color: #FFD68A;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      line-height: 1.5;
    }

    .deepa-info-list li::before {
      content: '🪔';
      flex-shrink: 0;
      font-size: 0.8rem;
      margin-top: 0.1rem;
    }

    /* ── Donation form ── */
    .form-panel {
      background: var(--white);
      border: 1px solid var(--gold); border-radius: 16px;
      padding: 2rem 1.6rem;
      box-shadow: 0 12px 40px var(--shadow-gold), 0 2px 0 var(--gold) inset;
    }

    .form-panel h2 { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--brown-dark); margin-bottom: 1.5rem; font-weight: 700; text-align: center; }

    .field-group { margin-bottom: 1.2rem; }

  gayatri: 5,
  acharya: 1,
  seva: 60,
  trust: 10,

  mantra: 9,
  yagna: 15,
  dhyana: 20,
  bhajans: 30,
  events: 45,
};

const getAmountsForTab = (tab) => {
  const minutes = TAB_DURATIONS[tab] || 1;

 return [
  { amount: minutes, label: ` ₹${minutes}` },
  { amount: minutes * 2, label: ` ₹${minutes * 2}` },
  { amount: minutes * 5, label: ` ₹${minutes * 5}` },
  { amount: minutes * 10, label: ` ₹${minutes * 10}` },
  { amount: minutes * 20, label: ` ₹${minutes * 20}` },
  { amount: minutes * 50, label: ` ₹${minutes * 50}` },
];
};

    function App() {
      const [form, setForm] = useState({ name:"", email:"", phone:"", amount:"", seva:"" });
      const [errors, setErrors] = useState({});
      const [activePreset, setActivePreset] = useState(null);
      const [showConfirm, setShowConfirm] = useState(false);
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(null);
      const [activeTab, setActiveTab] = useState("deepa");
      const [showAdmin, setShowAdmin] = useState(false);

      // Editable content state
      const [eventMessage, setEventMessage] = useState(
        "Join us for the sacred Deepa Sadhana — a divine ritual of lighting 1008 lamps to invoke the blessings of Maa Gayatri. Your donation lights the path of knowledge, peace, and liberation for all."
      );
      const [eventDate, setEventDate] = useState(new Date().toISOString().split('T')[0]);
      const [eventLocation, setEventLocation] = useState("Gayatri Peetham Trust, Hyderabad");
      const [draftMessage, setDraftMessage] = useState(eventMessage);
      const [draftDate, setDraftDate] = useState(new Date().toISOString().split('T')[0]);
      const [draftLocation, setDraftLocation] = useState(eventLocation);

      // Link generation
      const [generatedLink, setGeneratedLink] = useState("");
      const [copied, setCopied] = useState(false);

      const set = (field, val) => {
        setForm(f => ({ ...f, [field]: val }));
        setErrors(e => ({ ...e, [field]: undefined }));
      };

      const pickPreset = (amt) => { setActivePreset(amt); set("amount", String(amt)); };

      const handleSubmit = () => {
        const errs = validate(form);
        if (Object.keys(errs).length) { setErrors(errs); return; }
        setShowConfirm(true);
      };

      const applyChanges = () => {
        setEventMessage(draftMessage);
        setEventDate(draftDate);
        setEventLocation(draftLocation);
      };

      const generateLink = () => {
        const base = window.location.href.split('?')[0];
        const params = new URLSearchParams({
          msg: draftMessage,
          date: draftDate,
          loc: draftLocation,
        });
        const url = `${base}?${params.toString()}`;
        setGeneratedLink(url);
        // Also apply
        applyChanges();
      };

      const copyLink = () => {
        if (generatedLink) {
          navigator.clipboard.writeText(generatedLink).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2500);
          });
        }
      };

      // Load params from URL on mount
      useEffect(() => {
        const p = new URLSearchParams(window.location.search);
        if (p.get("msg")) { const m = p.get("msg"); setEventMessage(m); setDraftMessage(m); }
        if (p.get("date")) { const d = p.get("date"); setEventDate(d); setDraftDate(d); }
        if (p.get("loc")) { const l = p.get("loc"); setEventLocation(l); setDraftLocation(l); }
      }, []);

      const formatDate = (d) => {
        if (!d) return "";
        try {
          return new Date(d).toLocaleDateString("en-IN", { day:"numeric", month:"long", year:"numeric" });
        } catch { return d; }
      };

      const [showQR, setShowQR] = useState(false);
      const [qrPaymentRef, setQrPaymentRef] = useState("");
      const [paymentStatus, setPaymentStatus] = useState(null); // null | 'waiting' | 'success' | 'failed'
      const [countdown, setCountdown] = useState(600); // 10 minutes
      const countdownRef = React.useRef(null);

      const startCountdown = () => {
        setCountdown(600);
        if (countdownRef.current) clearInterval(countdownRef.current);
        countdownRef.current = setInterval(() => {
          setCountdown(prev => {
            if (prev <= 1) {
              clearInterval(countdownRef.current);
              setPaymentStatus('failed');
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      const stopCountdown = () => {
        if (countdownRef.current) clearInterval(countdownRef.current);
      };

      React.useEffect(() => { return () => stopCountdown(); }, []);

      const formatTime = (secs) => {
        const m = String(Math.floor(secs / 60)).padStart(2,'0');
        const s = String(secs % 60).padStart(2,'0');
        return m + ':' + s;
      };

      const processPayment = async () => {
        setShowConfirm(false);
        setLoading(false);
        const ref = "GPT-" + Date.now();
        setQrPaymentRef(ref);
        setPaymentStatus('waiting');
        setShowQR(true);
        startCountdown();
      };

      const confirmQRPayment = () => {
        stopCountdown();
        const sevaLabel = TAB_SEVA_OPTIONS[activeTab]?.find(s => s.value === form.seva)?.label || form.seva;
        setPaymentStatus('success');
        const paymentId = qrPaymentRef;
        setTimeout(() => {
          setShowQR(false);
          setSuccess({ paymentId, name: form.name, amount: form.amount, seva: sevaLabel });
          sendReceipt({ paymentId, name: form.name, amount: form.amount, seva: sevaLabel, contact: form.email, phone: form.phone });
        }, 2000);
      };

      const failPayment = () => {
        stopCountdown();
        setPaymentStatus('failed');
      };

      const retryPayment = () => {
        setPaymentStatus('waiting');
        startCountdown();
      };

      const closeQR = () => {
        stopCountdown();
        setShowQR(false);
        setPaymentStatus(null);
      };

      const sendReceipt = ({ paymentId, name, amount, seva, contact, phone }) => {
        const amountFormatted = Number(amount).toLocaleString('en-IN');
        const dateStr = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
        const msg = `🙏 *Gayatri Peetham Trust — Receipt*\n\n` +
          `Dear *${name}*,\n` +
          `Thank you for your generous contribution!\n\n` +
          `📋 *Payment Details*\n` +
          `• Seva: ${seva}\n` +
          `• Amount: ₹${amountFormatted}\n` +
          `• Reference: ${paymentId}\n` +
          `• Date: ${dateStr}\n\n` +
          `🪔 May the divine light of Maa Gayatri bless you always.\n` +
          `🏛️ Gayatri Peetham Trust, Hyderabad\n\n` +
          `_This is your payment receipt. Please save it for your records._`;

        // If contact is a phone number, send via WhatsApp
        const isPhone = /^[6-9]\d{9}$/.test((contact || "").trim());
        const targetPhone = isPhone ? contact.trim() : phone.trim();
        if (targetPhone && /^[6-9]\d{9}$/.test(targetPhone)) {
          const waUrl = `https://wa.me/91${targetPhone}?text=${encodeURIComponent(msg)}`;
          window.open(waUrl, "_blank");
        }
      };

      const shareWhatsApp = () => {
        if (!generatedLink) return;
        const text = encodeURIComponent(`🪔 *Deepa Sadhana* — Gayatri Peetham Trust\n\n${eventMessage}\n\n📅 ${formatDate(eventDate)}\n📍 ${eventLocation}\n\n🙏 Donate & support: ${generatedLink}`);
        window.open(`https://wa.me/?text=${text}`, "_blank");
      };

      const shareFacebook = () => {
        if (!generatedLink) return;
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(generatedLink)}`, "_blank");
      };

      const shareTwitter = () => {
        if (!generatedLink) return;
        const text = encodeURIComponent(`🪔 Deepa Sadhana – Gayatri Peetham Trust\n${eventMessage.substring(0,100)}...\nDonate: ${generatedLink}`);
        window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
      };

      return (
        <>
          <div className="top-border" />

          <main>
            {/* Info panel */}
            <aside className="info-panel">
              <div className="info-tabs">
                {[
                  { id:"acharya", label:"పరిశ్రమ" },
                  { id:"deepa", label:"దీప సాధన" },
                  { id:"gayatri", label:"జ్యోతి దర్శన" },
                  
                  { id:"seva", label:"అఖండ దీప సాధన" },
                  { id:"trust", label:"గాయత్రీ " },
                   { id:"deepaa", label:"దీప సాధన-" },
                  { id:"gayatrii", label:"జ్యోతి దర్శన-" },
                  { id:"acharyaa", label:"పరిశ్రమ-" },
                  { id:"sevaa", label:"అఖండ దీప సాధన-" },
                  { id:"trustt", label:"గాయత్రీ_ " },
                ].map(t => (
                  <button
                    key={t.id}
                    className={`info-tab ${activeTab === t.id ? "active" : ""}`}
                    onClick={() => setActiveTab(t.id)}
                  >{t.label}</button>
                ))}
              </div>

              {activeTab === "deepa" && (
                <div className="tab-pane deity-card">
                  <div>
                    <div className="deity-emblem">🪔</div>
                    <div className="deity-name">దీప సాధన</div>

                    <span style={{color:"#D4A017",fontFamily:"Cinzel,serif",fontSize:"0.72rem",letterSpacing:"0.12em"}}>చిత్రం జోడించండి</span>

                  <div className="deepa-info-card" style={{marginTop:"0.5rem"}}>

                  </div>
                  {/* Timings */}
                  <div style={{marginTop:"0.8rem",background:"linear-gradient(135deg,#1a0800,#3B1F00)",borderRadius:"10px",border:"1px solid #D4A01788",padding:"0.9rem 1rem"}}>
                    <div style={{fontFamily:"Cinzel,serif",fontSize:"0.75rem",color:"var(--gold)",letterSpacing:"0.1em",marginBottom:"0.5rem"}}>⏰ పీఠం వేళలు</div>

                  </div>
                </div>

            {/* నమోదు form */}

                  <p>📲 రశీదు మీ వాట్సాప్ నంబర్‌కు పంపబడింది. WhatsApp తెరుచుకోకపోతే మీ నంబర్‌ను తనిఖీ చేయండి.</p>
                  <div className="payment-id-box">
                    <strong>Payment Reference</strong>
                    {success.paymentId}

                  <p style={{fontSize:"0.9rem",color:"var(--brown-mid)",marginTop:"0.5rem"}}>
                    🪔 దీప సాధన పవిత్ర జ్యోతి మీ మార్గాన్ని సదా వెలిగించుగాక.

                  <button
                    onClick={() => { setSuccess(null); setForm({ name:"",email:"",phone:"",amount:"",seva:"" }); setActivePreset(null); }}

                  </div>

                  <div className="field-group">
                    <label>ఇమెయిల్ / వాట్సాప్ నంబర్</label>
                    <input type="text" placeholder="ఇమెయిల్ లేదా 10 అంకెల వాట్సాప్ నంబర్" value={form.email} onChange={e => set("email", e.target.value)} className={errors.email ? "error" : ""}/>

                  <div className="field-group">
                    <label>సాధన / ఉద్దేశ్యం — {TAB_LABELS[activeTab]}</label>
                    <select value={form.seva} onChange={e => set("seva", e.target.value)} className={errors.seva ? "error" : ""}>
                      <option value="">{TAB_LABELS[activeTab]} సేవను ఎంచుకోండి…</option>
                      {TAB_SEVA_OPTIONS[activeTab].map(o => (
                        <option key={o.value} value={o.value}>{o.label}</option>
                      ))}
                    </select>
                    {errors.seva && <p className="error-msg">{errors.seva}</p>}
                  </div>

                  <div className="field-group">
                    <label>సహకార మొత్తం (₹)</label>
                    <div className="amount-presets">

                      className={`preset-btn ${activePreset === item.amount ? "active" : ""}`}

                         >

                      </button>
                      ))}                   </div>
                    <div className="amount-display">
                      <span className="rupee-sign">₹</span>
                      <input type="number" placeholder="మొత్తం నమోదు చేయండి" value={form.amount} min="1" onChange={e => { set("amount", e.target.value); setActivePreset(null); }} className={errors.amount ? "error" : ""}/>
                    </div>
                    {errors.amount && <p className="error-msg">{errors.amount}</p>}
                  </div>

                  <button className="donate-btn" onClick={handleSubmit} disabled={loading}>
                    {loading ? <><span className="spinner"/>ప్రాసెస్ అవుతోంది…</> : "🪔 సహకారం అందించండి"}
                  </button>

                  <p className="rp-note">PhonePe UPI QR ద్వారా · Dasari Saiganesh అకౌంట్‌కు నేరుగా చెల్లించండి</p>

                  <div className="secure-badges">
                    <span className="badge"><span className="badge-icon">🔒</span> SSL సురక్షితం</span>
                    <span className="badge"><span className="badge-icon">✅</span> 80G పన్ను మినహాయింపు</span>
                    <span className="badge"><span className="badge-icon">🛡️</span> PCI-DSS సురక్షితం</span>
                  </div>
                </>
              )}
            </section>
          </main>

          <footer>
            <p>© {new Date().getFullYear()} Gayatri Peetham Trust · దీప సాధన · అన్ని హక్కులు నిల్వ చేయబడ్డాయి</p>

          </footer>

          {showQR && (
            <div className="modal-backdrop" onClick={paymentStatus === 'waiting' ? undefined : closeQR}>
              <div className="modal-box" style={{maxWidth:"420px",textAlign:"center",padding:"0",overflow:"hidden",borderRadius:"18px"}} onClick={e => e.stopPropagation()}>

                {/* ── SUCCESS STATE ── */}
                {paymentStatus === 'success' && (
                  <div style={{padding:"2.5rem 1.5rem",background:"linear-gradient(135deg,#064e3b,#065f46)"}}>
                    <div style={{fontSize:"4rem",marginBottom:"0.5rem",animation:"popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275)"}}>✅</div>
                    <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:"1.3rem",color:"#6ee7b7",marginBottom:"0.5rem"}}>Payment Successful!</div>
                    <div style={{color:"#a7f3d0",fontSize:"1rem",marginBottom:"0.3rem"}}>₹{Number(form.amount).toLocaleString('en-IN')} credited to Gayatri Peetham Trust</div>
                    <div style={{color:"#6ee7b7",fontSize:"0.82rem",opacity:0.8}}>రశీదు వాట్సాప్‌కు పంపబడుతోంది...</div>
                  </div>
                )}

                {/* ── FAILED STATE ── */}
                {paymentStatus === 'failed' && (
                  <div style={{padding:"2rem 1.5rem",background:"linear-gradient(135deg,#450a0a,#7f1d1d)"}}>

                    <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:"1.2rem",color:"#fca5a5",marginBottom:"0.5rem"}}>Payment Failed / Expired</div>
                    <div style={{color:"#fecaca",fontSize:"0.9rem",marginBottom:"1.2rem"}}>చెల్లింపు పూర్తి కాలేదు లేదా సమయం ముగిసింది</div>
                    <div style={{display:"flex",gap:"0.75rem",justifyContent:"center"}}>
                      <button onClick={retryPayment} style={{padding:"0.65rem 1.2rem",background:"linear-gradient(135deg,#dc2626,#ef4444)",border:"none",borderRadius:"10px",color:"white",fontFamily:"'Cinzel',serif",fontSize:"0.85rem",cursor:"pointer",fontWeight:"700"}}>

                      </button>
                      <button onClick={closeQR} style={{padding:"0.65rem 1.2rem",background:"transparent",border:"1.5px solid #fca5a5",borderRadius:"10px",color:"#fca5a5",fontFamily:"'Cinzel',serif",fontSize:"0.85rem",cursor:"pointer"}}>
                        రద్దు
                      </button>
                    </div>
                  </div>
                )}

                {/* ── WAITING / SCAN STATE ── */}
                {paymentStatus === 'waiting' && (
                  <>
                    {/* Top bar with timer */}
                    <div style={{background:"linear-gradient(135deg,#5B2D8E,#7C3AED)",padding:"0.85rem 1.2rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                        <div style={{width:"30px",height:"30px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:"900",fontSize:"1rem"}}>₱</div>

                      {/* Mobile: tap-to-open UPI apps */}

                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>
                          {[
                            {name:"PhonePe", icon:"📱", color:"#5B2D8E", bg:"#f3e8ff", link:`phonepe://pay?pa=9966966013@ybl&pn=Gayatri+Peetham+Trust&am=${form.amount}&cu=INR&tn=${encodeURIComponent((form.seva||'Deepa Sadhana').substring(0,30))}`},
                            {name:"Google Pay", icon:"💚", color:"#0f9d58", bg:"#f0fdf4", link:`tez://upi/pay?pa=9966966013@ybl&pn=Gayatri+Peetham+Trust&am=${form.amount}&cu=INR&tn=${encodeURIComponent((form.seva||'Deepa Sadhana').substring(0,30))}`},
                            {name:"Paytm", icon:"🔵", color:"#00baf2", bg:"#f0f9ff", link:`paytmmp://pay?pa=9966966013@ybl&pn=Gayatri+Peetham+Trust&am=${form.amount}&cu=INR`},
                            {name:"BHIM/UPI", icon:"🟠", color:"#e65c00", bg:"#fff7ed", link:`upi://pay?pa=9966966013@ybl&pn=Gayatri+Peetham+Trust&am=${form.amount}&cu=INR&tn=${encodeURIComponent((form.seva||'Deepa Sadhana').substring(0,30))}&tr=${qrPaymentRef}`},
                          ].map(app => (
                            <a key={app.name} href={app.link}

                                display:"flex",alignItems:"center",gap:"0.5rem",

                                textDecoration:"none", color:app.color,
                                fontFamily:"'Cinzel',serif",fontSize:"0.75rem",fontWeight:"700",
                                cursor:"pointer", transition:"all 0.15s",
                                boxShadow:"0 1px 4px rgba(0,0,0,0.08)"
                              }}
                              onClick={() => { /* user goes to app, timer keeps running */ }}
                            >
                              <span style={{fontSize:"1.3rem"}}>{app.icon}</span>
                              <span>{app.name}</span>
                            </a>
                          ))}
                        </div>
                      </div>

                      {/* Divider */}
                      <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.9rem"}}>
                        <div style={{flex:1,height:"1px",background:"#e5e7eb"}}/>
                        <span style={{fontSize:"0.72rem",color:"#9ca3af",fontFamily:"'Cinzel',serif"}}>లేదా QR స్కాన్ చేయండి</span>
                        <div style={{flex:1,height:"1px",background:"#e5e7eb"}}/>
                      </div>

                      {/* QR Code */}
                      <div style={{background:"white",border:"2px solid #7C3AED44",borderRadius:"14px",padding:"0.75rem",display:"inline-block",marginBottom:"0.8rem",boxShadow:"0 2px 12px #7C3AED22"}}>
                        <img
                          src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=4&data=${encodeURIComponent('upi://pay?pa=9966966013@ybl&pn=Gayatri+Peetham+Trust&am=' + form.amount + '&cu=INR&tn=' + encodeURIComponent((form.seva||'Deepa Sadhana').substring(0,50)) + '&tr=' + qrPaymentRef)}`}
                          alt="UPI QR"
                          style={{width:"200px",height:"200px",display:"block",borderRadius:"8px"}}
                        />
                      </div>

                      {/* Payment ref */}
                      <div style={{background:"#FFF8DC",border:"1px dashed var(--gold)",borderRadius:"8px",padding:"0.5rem 0.8rem",marginBottom:"0.9rem",textAlign:"left",fontSize:"0.8rem"}}>
                        <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"0.15rem 0.6rem",color:"var(--brown-mid)"}}>
                          <span>👤</span><strong style={{color:"var(--brown-dark)"}}>{form.name}</strong>
                          <span>💰</span><strong style={{color:"#5B2D8E"}}>₹{Number(form.amount).toLocaleString('en-IN')}</strong>
                          <span>🔖</span><span style={{fontFamily:"monospace",fontSize:"0.73rem",color:"var(--brown-mid)"}}>{qrPaymentRef}</span>
                        </div>
                      </div>

                      <p style={{fontSize:"0.75rem",color:"#6b7280",marginBottom:"0.9rem",lineHeight:"1.5"}}>
                        చెల్లింపు పూర్తయిన తర్వాత <strong>"✅ చెల్లించాను"</strong> నొక్కండి<br/>
                        రశీదు వాట్సాప్‌కు స్వయంచాలకంగా వస్తుంది
                      </p>

                      {/* Actions */}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.5rem"}}>
                        <button onClick={closeQR} style={{padding:"0.65rem 0.4rem",background:"transparent",border:"1.5px solid #d1d5db",borderRadius:"10px",color:"#6b7280",fontFamily:"'Cinzel',serif",fontSize:"0.75rem",cursor:"pointer"}}>
                          రద్దు
                        </button>
                        <button onClick={failPayment} style={{padding:"0.65rem 0.4rem",background:"transparent",border:"1.5px solid #fca5a5",borderRadius:"10px",color:"#dc2626",fontFamily:"'Cinzel',serif",fontSize:"0.75rem",cursor:"pointer"}}>
                          ❌ వీలుకాలేదు
                        </button>
                        <button onClick={confirmQRPayment} style={{padding:"0.65rem 0.4rem",background:"linear-gradient(135deg,#5B2D8E,#7C3AED)",border:"none",borderRadius:"10px",color:"white",fontFamily:"'Cinzel',serif",fontSize:"0.75rem",fontWeight:"700",cursor:"pointer",boxShadow:"0 3px 10px #7C3AED44"}}>
                          ✅ చెల్లించాను
                        </button>
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

                    {showConfirm && (
            <div className="modal-backdrop" onClick={() => setShowConfirm(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>🙏 నమోదును నిర్ధారించండి</h3>
                <p>చెల్లింపుకు ముందు దయచేసి క్రింది వివరాలు తనిఖీ చేయండి.</p>
                <table className="summary-table">
                  <tbody>
                    <tr><td>దాతృ పేరు</td><td>{form.name}</td></tr>
                    <tr><td>ఇమెయిల్ / వాట్సాప్</td><td>{form.email}</td></tr>
                    <tr><td>మొబైల్</td><td>{form.phone}</td></tr>
                    <tr><td>సాధన వేళ</td><td>{TAB_SEVA_OPTIONS[activeTab]?.find(s=>s.value===form.seva)?.label || form.seva}</td></tr>
                    <tr><td><strong>మొత్తం మొత్తం</strong></td><td><strong>₹{Number(form.amount).toLocaleString("en-IN")}</strong></td></tr>
                  </tbody>
                </table>
                <div className="modal-actions">
                  <button className="btn-cancel" onClick={() => setShowConfirm(false)}>సవరించు</button>
                  <button className="btn-confirm" onClick={processPayment}>చెల్లించండి 🙏</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
